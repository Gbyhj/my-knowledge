<h1>生态系统</h1>

<h2>五槽</h2>

<li>**包含槽**：{ 种群, 群落, 环境（非生物因素）}</li>
<li>**量化槽**：尺度从局部（池塘）到全球（生物圈）</li>
<li>**状态槽**：动态平衡 / 演替 / 崩溃</li>
<li>**功能槽**：物质循环 + 能量流动</li>
<li>**关系槽**：← <a href="生物个体.html">生物个体</a>；→ <a href="人类.html">人类</a></li>

<h2>关键概念</h2>

<li>**食物链**：生产者 → 消费者 → 分解者</li>
<li>**营养级**：能量传递效率约 10%</li>
<li>**生态位**：每个物种在生态系统中的角色</li>
<li>**生物多样性**：稳定性与适应性的基础</li>
