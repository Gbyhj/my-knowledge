<h1>轻子</h1>

<h2>五槽</h2>

<li>**包含槽**：{ 电子, μ子, τ子, 电子中微子, μ中微子, τ中微子 }</li>
<li>**量化槽**：6种；自旋 1/2；电子电荷 -1，中微子电荷 0</li>
<li>**状态槽**：不参与强相互作用；中微子几乎不与任何物质作用</li>
<li>**功能槽**：参与弱相互作用和电磁相互作用（带电轻子）</li>
<li>**关系槽**：与夸克同为费米子，是物质的基本构成</li>

<h2>笔记</h2>

<li>电子是日常生活中最重要的轻子</li>
<li>中微子质量非零（振荡实验证明），但非常小</li>
