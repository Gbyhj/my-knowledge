<h1>强子</h1>

<h2>五槽</h2>

<li>**包含槽**：{ 质子, 中子, 介子 }</li>
<li>**量化槽**：质子质量 938 MeV/c²；中子质量 940 MeV/c²</li>
<li>**状态槽**：质子在原子核外稳定，中子自由时衰变（~15分钟半衰期）</li>
<li>**功能槽**：构成原子核</li>
<li>**关系槽**：由夸克通过胶子结合而成；→ <a href="原子核.html">原子核</a></li>

<h2>笔记</h2>

<li>质子 = uud；中子 = udd</li>
<li>质子数量决定元素种类</li>
