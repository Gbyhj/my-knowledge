<h1>基本力</h1>

<h2>四种基本相互作用</h2>

<tr><td>力</td><td>相对强度</td><td>作用范围</td><td>传递玻色子</td><td>作用对象</td></tr>
<tr><td>强核力</td><td>1</td><td>10⁻¹⁵ m</td><td>胶子</td><td>夸克</td></tr>
<tr><td>电磁力</td><td>1/137</td><td>∞</td><td>光子</td><td>带电粒子</td></tr>
<tr><td>弱核力</td><td>10⁻⁶</td><td>10⁻¹⁸ m</td><td>W/Z</td><td>所有费米子</td></tr>
<tr><td>引力</td><td>10⁻³⁹</td><td>∞</td><td>引力子(?)</td><td>质量/能量</td></tr>

<h2>笔记</h2>

<li>强力和弱力是短程力，只在原子核尺度起作用</li>
<li>引力和电磁力是长程力</li>
<li>**大一统理论**的目标是统一四种力</li>
