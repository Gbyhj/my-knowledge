<li>**包含槽**：{ 三维空间, 一维时间 }</li>
<li>**量化槽**：3+1 维；普朗克长度 ~1.6×10⁻³⁵ m；普朗克时间 ~5.4×10⁻⁴⁴ s</li>
<li>**状态槽**：在广义相对论中动态弯曲</li>
<li>**功能槽**：所有物理事件的舞台，引力 = 时空弯曲</li>
<li>**关系槽**：与物质/能量通过爱因斯坦场方程耦合</li>

<h2>笔记</h2>

<li>狭义相对论：时空是平直的闵可夫斯基空间</li>
<li>广义相对论：物质告诉时空如何弯曲，时空告诉物质如何运动</li>
