<h1>原子核</h1>

<h2>五槽</h2>

<li>**包含槽**：{ 质子, 中子 }</li>
<li>**量化槽**：直径 ~10⁻¹⁵ m；密度 ~2.3×10¹⁷ kg/m³</li>
<li>**状态槽**：核力束缚（强力克服质子间电磁斥力）；放射性可衰变</li>
<li>**功能槽**：原子的核心，决定元素身份</li>
<li>**关系槽**：← <a href="强子.html">强子</a>；→ <a href="原子.html">原子</a></li>

<h2>笔记</h2>

<li>核子数 A = 质子数 Z + 中子数 N</li>
<li>同位素：相同 Z，不同 N</li>
<li>核裂变：重核分裂；核聚变：轻核结合</li>
